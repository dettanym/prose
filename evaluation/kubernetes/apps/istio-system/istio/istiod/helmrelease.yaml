---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 15m
  chart:
    spec:
      chart: istiod
      version: 1.20.3
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
    crds: CreateReplace
  uninstall:
    keepHistory: false
  values:
    global:
      imagePullPolicy: Always
      proxy_init:
        image: ghcr.io/dettanym/prose-istio-proxyv2:main@sha256:f9e5ede854e995e18392a3c2449eb5fcf87e8d072b3b084cf6e3c06381efe663
      proxy:
        image: ghcr.io/dettanym/prose-istio-proxyv2:main@sha256:f9e5ede854e995e18392a3c2449eb5fcf87e8d072b3b084cf6e3c06381efe663
    meshConfig:
      defaultProviders:
        tracing:
          - zipkin
      extensionProviders:
        - name: zipkin
          zipkin:
            service: jaeger-collector.prose-system.svc.cluster.local
            port: 9411
